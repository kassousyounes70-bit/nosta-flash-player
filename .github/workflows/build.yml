name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Ruffle
        run: |
          mkdir -p app/src/main/assets/ruffle
          curl -L "https://github.com/ruffle-rs/ruffle/releases/download/nightly-2024-09-01/ruffle-nightly-2024-09-01-web.zip" -o ruffle.zip
          unzip -j ruffle.zip "*.js"   -d app/src/main/assets/ruffle/ || true
          unzip -j ruffle.zip "*.wasm" -d app/src/main/assets/ruffle/ || true
          echo "Ruffle files:"
          ls -la app/src/main/assets/ruffle/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nosta-flash-player-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

