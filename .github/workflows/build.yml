name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Download Ruffle
        run: |
          mkdir -p app/src/main/assets/ruffle
          RUFFLE_URL=$(curl -s https://api.github.com/repos/ruffle-rs/ruffle/releases | jq -r '[ .[].assets[]? | select(.name | endswith("web-selfhosted.zip")) | .browser_download_url ] | .[0]')
          curl -L --fail --retry 3 "$RUFFLE_URL" -o ruffle.zip
          unzip -j ruffle.zip "*.js" -d app/src/main/assets/ruffle/
          unzip -j ruffle.zip "*.wasm" -d app/src/main/assets/ruffle/

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nosta-flash-player-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
